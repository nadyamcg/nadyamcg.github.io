<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>４０４</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.png" type="image/png">
<style>
:root {
    --bg: #000;
    --text: #8899ff;
    --headers: #9999aa;
    --accent: #00a0c0;
    --glow: rgba(136, 153, 255, 0.6);
    --glow-soft: rgba(136, 153, 255, 0.3);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    image-rendering: pixelated;
    -webkit-font-smoothing: none;
    font-smooth: never;
    cursor: url('assets/mouse01.gif'), auto;
}

/* custom cursors */
a, button, [role="button"] {
    cursor: url('assets/mouse01.gif'), pointer;
}

*:active {
    cursor: url('assets/mouse02.gif'), wait;
}

body {
    background-color: var(--bg);
    background-image: url('assets/bg-noise.gif');
    background-repeat: repeat;
    background-attachment: fixed;
    color: var(--text);
    font-family: sylfaen, times, serif;
    min-height: 100vh;
    overflow-x: hidden;
}

/* crt screen container */
.crt {
    position: fixed;
    inset: 0;
    overflow: hidden;
}

/* subtle crt curvature via radial gradient vignette */
.crt::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(
        ellipse 120% 120% at 50% 50%,
        transparent 0%,
        transparent 60%,
        rgba(0, 0, 0, 0.3) 90%,
        rgba(0, 0, 0, 0.7) 100%
    );
    pointer-events: none;
    z-index: 90;
}

/* scanlines via gif overlay */
.crt::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url('assets/fg_flikr004.gif');
    background-repeat: repeat;
    background-size: auto;
    opacity: 0.1;
    pointer-events: none;
    z-index: 100;
    mix-blend-mode: overlay;
}

/* subtle screen flicker */
@keyframes screen-flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.97; }
    94% { opacity: 1; }
    97% { opacity: 0.98; }
    98% { opacity: 1; }
}

/* slow color drift like old monitors */
@keyframes color-drift {
    0%, 100% { filter: hue-rotate(0deg) saturate(1); }
    25% { filter: hue-rotate(2deg) saturate(1.02); }
    50% { filter: hue-rotate(-1deg) saturate(0.98); }
    75% { filter: hue-rotate(1deg) saturate(1.01); }
}

body {
    animation:
        screen-flicker 8s linear infinite,
        color-drift 60s ease-in-out infinite;
}

/* phosphor persistence / ghosting on text */
.code, .title, .message {
    text-shadow: inherit;
}

.code::after {
    content: "４０４";
    position: absolute;
    left: 0;
    top: 0;
    opacity: 0.15;
    filter: blur(2px);
    animation: phosphor-fade 0.1s linear infinite;
    pointer-events: none;
}

@keyframes phosphor-fade {
    from { opacity: 0.15; transform: translate(0, 0); }
    to { opacity: 0; transform: translate(1px, 1px); }
}

/* fade in */
@keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* text glow pulse */
@keyframes glow-pulse {
    0%, 100% { text-shadow: 0 0 4px var(--glow), 0 0 12px var(--glow-soft); }
    50% { text-shadow: 0 0 8px var(--glow), 0 0 20px var(--glow-soft); }
}

/* blink */
@keyframes blink {
    50% { opacity: 0.2; }
}

/* glitch text effect */
.glitch-text {
    position: relative;
    display: inline-block;
    white-space: nowrap;
}

.glitch-text::before,
.glitch-text::after {
    content: attr(data-en);
    position: absolute;
    left: 0;
    top: 0;
    white-space: nowrap;
    pointer-events: none;
}

/* chromatic aberration layers */
.glitch-text::before {
    color: #ff0044;
    opacity: 0;
    transform: translate(-2px, 0);
    clip-path: inset(0 0 50% 0);
}

.glitch-text::after {
    color: #00ffff;
    opacity: 0;
    transform: translate(2px, 0);
    clip-path: inset(50% 0 0 0);
}

@keyframes glitch-reveal {
    0%, 14.8%, 15.5%, 41.8%, 42.3%, 72.5%, 75%, 100% {
        opacity: 0;
        transform: translate(0, 0);
    }
    15%, 15.3% {
        opacity: 1;
        transform: translate(0, 0);
    }
    15.35% {
        opacity: 1;
        transform: translate(-3px, 0);
    }
    15.4% {
        opacity: 1;
        transform: translate(2px, 0);
    }
    42%, 42.15% {
        opacity: 0.9;
        transform: translate(0, 0);
    }
    42.2% {
        opacity: 0.9;
        transform: translate(1px, 1px);
    }
    73%, 74% {
        opacity: 1;
        transform: translate(0, 0);
    }
    74.2% {
        opacity: 1;
        transform: translate(-2px, 0);
    }
    74.5% {
        opacity: 0.6;
        clip-path: inset(15% 0 40% 0);
    }
}

@keyframes glitch-hide {
    0%, 14.8%, 15.5%, 41.8%, 42.3%, 72.5%, 75%, 100% {
        opacity: 1;
    }
    15%, 15.4%, 42%, 42.2%, 73%, 74.5% {
        opacity: 0;
    }
}

@keyframes chromatic-red {
    0%, 14.8%, 15.5%, 41.8%, 42.3%, 72.5%, 75%, 100% {
        opacity: 0;
    }
    15.1%, 15.35% {
        opacity: 0.5;
    }
    42.05%, 42.15% {
        opacity: 0.4;
    }
    73.5%, 74.3% {
        opacity: 0.6;
    }
}

@keyframes chromatic-cyan {
    0%, 14.8%, 15.5%, 41.8%, 42.3%, 72.5%, 75%, 100% {
        opacity: 0;
    }
    15.15%, 15.38% {
        opacity: 0.5;
    }
    42.08%, 42.18% {
        opacity: 0.4;
    }
    73.6%, 74.35% {
        opacity: 0.6;
    }
}

.glitch-text::before {
    animation: chromatic-red 8s step-end infinite;
}

.glitch-text::after {
    animation: glitch-reveal 8s step-end infinite, chromatic-cyan 8s step-end infinite;
}

.glitch-text > span {
    animation: glitch-hide 8s step-end infinite;
}

.title.glitch-text::before,
.title.glitch-text::after,
.title.glitch-text > span {
    animation-duration: 8s;
}

.flower-name.glitch-text::before,
.flower-name.glitch-text::after,
.flower-name.glitch-text > span {
    animation-duration: 11s;
    animation-delay: 3s;
}

.content {
    position: absolute;
    top: 8%;
    left: 6%;
    animation: fade-in 0.8s ease-out;
}

.code {
    position: relative;
    font-size: clamp(48px, 12vw, 100px);
    letter-spacing: 0.3em;
    color: var(--text);
    text-shadow: 0 0 6px var(--glow), 0 0 16px var(--glow-soft);
    animation: glow-pulse 4s ease-in-out infinite;
    margin-bottom: 10px;
}

.title {
    font-size: clamp(14px, 3vw, 22px);
    letter-spacing: 0.4em;
    color: var(--headers);
    text-shadow: 0 0 4px var(--glow-soft);
    margin-bottom: 60px;
    text-transform: uppercase;
}

.message {
    font-size: clamp(13px, 2vw, 16px);
    letter-spacing: 0.15em;
    line-height: 2.2;
    color: var(--text);
    opacity: 0.8;
    max-width: 500px;
}

.message a {
    color: var(--accent);
    text-decoration: none;
    position: relative;
    transition: text-shadow 0.2s ease;
}

.message a:hover {
    text-shadow:
        0 0 8px var(--accent),
        -1px 0 0 #ff0044,
        1px 0 0 #00ffff;
    animation: link-glitch 0.3s steps(2) infinite;
}

@keyframes link-glitch {
    0% { transform: translate(0, 0); }
    25% { transform: translate(-1px, 0); }
    50% { transform: translate(1px, 0); }
    75% { transform: translate(0, 1px); }
    100% { transform: translate(0, 0); }
}

.flower {
    display: block;
    margin-top: 50px;
    font-size: clamp(12px, 2vw, 15px);
    letter-spacing: 0.2em;
    color: var(--headers);
    opacity: 0.5;
}

.flower-icon {
    display: inline-block;
    animation: blink 3s ease-in-out infinite;
}

.flower-name {
    display: inline-block;
}

/* decorative lines */
.deco {
    position: absolute;
    top: 6%;
    right: 8%;
    font-size: clamp(10px, 1.5vw, 14px);
    letter-spacing: 0.1em;
    color: var(--text);
    opacity: 0.15;
    text-align: right;
    line-height: 1.8;
}

.deco span {
    display: block;
}

.deco .d1 { animation: blink 2s linear infinite; }
.deco .d2 { animation: blink 2s linear infinite; animation-delay: 0.4s; }
.deco .d3 { animation: blink 2s linear infinite; animation-delay: 0.8s; }
.deco .d4 { animation: blink 2s linear infinite; animation-delay: 1.2s; }
.deco .d5 { animation: blink 2s linear infinite; animation-delay: 1.6s; }

/* image positioned bottom right */
.figure {
    position: fixed;
    bottom: 0;
    right: 5%;
    width: clamp(180px, 30vw, 400px);
    height: auto;
    opacity: 0.75;
    pointer-events: none;
    animation: fade-in 1.2s ease-out;
    z-index: 50;
}

/* responsive */
@media (max-width: 900px) {
    .content {
        top: 5%;
        left: 5%;
        right: 5%;
    }
    .deco {
        display: none;
    }
    .figure {
        right: 0;
        opacity: 0.5;
    }
}
</style>
</head>
<body>
<div class="crt">

<div class="content">
    <div class="code">４０４</div>
    <div class="title glitch-text" data-en="PAGE NOT FOUND"><span>страница не найдена</span></div>

    <div class="message">
        ты заблудился.<br>
        нет такой страницы.<br><br>

        <a href="/index.html">← вернуться домой</a><br>
        <a href="/blog/">← читать блог</a><br>
        <a href="/contact/">← связаться</a>

        <span class="flower">
            <span class="flower-icon">✿</span>
            <span class="flower-name glitch-text" data-en="forget-me-not"><span>незабудка</span></span>
        </span>
    </div>
</div>

<div class="deco">
    <span class="d1">║░░░░░░░░░░░║</span>
    <span class="d2">║░▒▒▒▒▒▒▒▒░║</span>
    <span class="d3">║░▒░░░░░░▒░║</span>
    <span class="d4">║░▒▒▒▒▒▒▒▒░║</span>
    <span class="d5">║░░░░░░░░░░░║</span>
</div>

<img class="figure" src="assets/2.png" alt="">

</div>
</body>
</html>
